name: Release Artifacts

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
          - os: macos-14
            target: x86_64-apple-darwin
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          name="warmplane-${VERSION}-${{ matrix.target }}"
          stage="dist/${name}"
          mkdir -p "$stage"

          cp "target/${{ matrix.target }}/release/warmplane" "$stage/"
          cp README.md "$stage/"
          cp docs/openapi.yaml "$stage/"
          cp docs/config.schema.json "$stage/"

          tar -C dist -czf "dist/${name}.tar.gz" "$name"

          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" || "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            cp "target/${{ matrix.target }}/release/warmplane" "dist/warmplane-${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warmplane-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/warmplane-*-apple-darwin
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-dist
        run: |
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name 'warmplane-*-apple-darwin' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*.tar.gz
            release-dist/warmplane-*-apple-darwin
            release-dist/checksums.txt
